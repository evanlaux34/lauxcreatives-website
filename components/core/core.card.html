<!-- @dsCard group="Components" viewport="700x620" name="Core" subtitle="Buttons, tags, fields, photo card, headers & logos" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); padding:26px; font-family:var(--font-editorial); }
  .group { margin-bottom:26px; }
  .gl { font-family:var(--font-label); font-size:10px; letter-spacing:0.26em; text-transform:uppercase; color:var(--lc-ink-muted); margin-bottom:14px; border-top:1px solid var(--lc-line); padding-top:12px; }
  .row { display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .dark { background:var(--surface-dark); padding:18px; display:flex; gap:16px; align-items:center; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Tag, Logo, PhotoCard, SectionHeader, Input, Divider, Caption, Eyebrow } = window.LauxCreativesDesignSystem_2042c0;

  function Demo() {
    return (
      <React.Fragment>
        <div className="group">
          <div className="gl">Buttons</div>
          <div className="row">
            <Button variant="primary">Inquire</Button>
            <Button variant="secondary">View Portfolio</Button>
            <Button variant="ghost">Read more</Button>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="dark" style={{ marginTop: '14px' }}>
            <Button variant="onDark" as="a" href="#">Get in touch</Button>
            <Logo variant="wordmark" size={30} tone="paper" />
          </div>
        </div>

        <div className="group">
          <div className="gl">Tags</div>
          <div className="row">
            <Tag>Weddings</Tag>
            <Tag variant="solid">Featured</Tag>
            <Tag variant="accent">Engagements</Tag>
            <Tag variant="pill">Family</Tag>
          </div>
        </div>

        <div className="cols">
          <div className="group">
            <div className="gl">Photo Card</div>
            <PhotoCard src="../../assets/photos/IMG_0374.jpg" caption="held still for a second" fig="Fig. 02" height={180} />
          </div>
          <div className="group">
            <div className="gl">Fields</div>
            <div style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
              <Input label="Your name" placeholder="Evan & Alexis" />
              <Input label="The date" placeholder="Golden hour, October" />
            </div>
          </div>
        </div>

        <div className="group">
          <div className="gl">Section Header</div>
          <SectionHeader number="02" title="Palette" meta="Pulled from film" />
        </div>

        <div className="group">
          <div className="gl">Divider · Eyebrow · Caption</div>
          <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
            <Eyebrow number="01" tone="accent">Chicago &amp; Beyond</Eyebrow>
            <Divider label="Chicago · 2024" />
            <Caption fig="Fig. 03">35mm · the in-between moments</Caption>
          </div>
        </div>

        <div className="group">
          <div className="gl">Logo Suite</div>
          <div className="row">
            <Logo variant="mark" size={56} tone="ink" />
            <Logo variant="wordmark" size={36} />
            <Logo variant="lockup" size={64} tone="ink" />
            <Logo variant="badge" size={84} tone="ink" />
            <Logo variant="stamp" size={84} tone="ink" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
