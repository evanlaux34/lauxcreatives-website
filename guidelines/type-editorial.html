<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); padding:22px 24px; }
  .eyebrow { font-family:var(--font-label); font-size:11px; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-accent); margin-bottom:14px; }
  .lead { font-family:var(--font-editorial); font-style:italic; font-size:30px; line-height:1.3; color:var(--text-heading); max-width:600px; }
  .body { font-family:var(--font-editorial); font-size:17px; line-height:1.62; color:var(--text-body); margin-top:14px; max-width:560px; }
  .glyphs { font-family:var(--font-editorial); font-size:16px; color:var(--text-meta); margin-top:12px; }
</style>
</head>
<body>
  <div class="eyebrow">Editorial · EB Garamond · 400 / italic</div>
  <div class="lead">Drawn to the moments, details, and ideas that make your story worth telling.</div>
  <div class="body">We're not here to check boxes. We're here to show up, earn your trust, and create something that actually feels like you.</div>
  <div class="glyphs">ABCDEFGHIJKLM&nbsp;&nbsp;abcdefghijklm&nbsp;&nbsp;1234567890</div>
</body>
</html>
