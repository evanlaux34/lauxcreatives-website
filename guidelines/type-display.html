<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); padding:22px 24px; }
  .eyebrow { font-family:var(--font-label); font-size:11px; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-accent); margin-bottom:10px; }
  .big { font-family:var(--font-display); font-weight:400; font-size:72px; line-height:1.0; letter-spacing:-0.01em; color:var(--text-heading); }
  .glyphs { font-family:var(--font-display); font-size:24px; color:var(--text-meta); margin-top:14px; }
  .glyphs em { font-style:italic; }
</style>
</head>
<body>
  <div class="eyebrow">Display · Bringbold · 400</div>
  <div class="big">Worth Remembering</div>
  <div class="glyphs">ABCDEFGHIJKLM&nbsp;&nbsp;abcdefghijklm&nbsp;&nbsp;1234567890&nbsp;&nbsp;<em>italic</em></div>
</body>
</html>
