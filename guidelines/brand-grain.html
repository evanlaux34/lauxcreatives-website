<!-- @dsCard group="Brand" viewport="700x230" name="Grain & Inset Frame" subtitle="Film-grain wash + hairline frame on photo" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); padding:20px; }
  .stage { position:relative; height:190px; overflow:hidden;
    background-image:linear-gradient(180deg,rgba(40,35,24,0.45),rgba(40,35,24,0.6)),url('../assets/photos/IMG_9828.jpg');
    background-size:cover; background-position:center 35%; color:var(--text-on-dark); }
  .frame { position:absolute; inset:16px; border:1px solid var(--lc-line-on-photo); pointer-events:none; }
  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .eyebrow { font-family:var(--font-label); font-size:10px; letter-spacing:0.34em; text-transform:uppercase; color:var(--text-accent); margin-bottom:12px; }
  .word { font-family:var(--font-display); font-size:46px; line-height:0.95; text-shadow:0 2px 14px rgba(30,26,16,0.4); }
</style>
</head>
<body>
  <div class="stage">
    <div class="lc-grain"></div>
    <div class="frame"></div>
    <div class="center">
      <div class="eyebrow">Chicago &amp; Beyond</div>
      <div class="word">Laux Creatives</div>
    </div>
  </div>
</body>
</html>
