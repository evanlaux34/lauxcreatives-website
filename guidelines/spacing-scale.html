<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base — generous editorial rhythm" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); padding:22px 24px; font-family:var(--font-label); }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .bar { height:16px; background:var(--lc-aged-olive); }
  .tok { font-size:11px; color:var(--text-heading); width:80px; }
  .px { font-size:10.5px; color:var(--text-meta); letter-spacing:0.04em; }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="tok">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="tok">space-6</span><span class="bar" style="width:32px"></span><span class="px">32px · gutter unit</span></div>
  <div class="row"><span class="tok">space-9</span><span class="bar" style="width:64px"></span><span class="px">64px · page gutter</span></div>
  <div class="row"><span class="tok">space-10</span><span class="bar" style="width:84px"></span><span class="px">84px · section rhythm</span></div>
</body>
</html>
