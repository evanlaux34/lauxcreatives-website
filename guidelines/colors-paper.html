<!-- @dsCard group="Colors" viewport="700x150" name="Paper & Surfaces" subtitle="Warm paper stack — mat board to lifted card" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-label); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:20px; }
  .sw { display:flex; flex-direction:column; }
  .chip { height:84px; border:1px solid var(--border-card); }
  .name { font-family:var(--font-display); font-size:21px; color:var(--text-heading); margin-top:11px; }
  .hex { font-family:var(--font-label); font-size:11px; color:var(--text-meta); margin-top:3px; letter-spacing:0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lc-sand)"></div><div class="name">Sand</div><div class="hex">#DED4B8 · mat board</div></div>
    <div class="sw"><div class="chip" style="background:var(--lc-ivory-paper)"></div><div class="name">Ivory Paper</div><div class="hex">#EBE2C9 · page</div></div>
    <div class="sw"><div class="chip" style="background:var(--lc-ivory-deep)"></div><div class="name">Ivory Deep</div><div class="hex">#E3D9BD · alt</div></div>
    <div class="sw"><div class="chip" style="background:var(--lc-ivory-light)"></div><div class="name">Ivory Light</div><div class="hex">#F4EDDB · card</div></div>
  </div>
</body>
</html>
